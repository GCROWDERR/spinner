<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinner</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #ffffff;
    }
    object {
      width: 256px;
      height: 256px;
    }
  </style>
</head>
<body>
  <object id="spinner" type="image/svg+xml" data="/Favicon.svg" width="256" height="256" aria-label="Animated spinner"></object>
  <script>
    function startSpinnerAnimations() {
      const svg = document.getElementById("spinner").contentDocument;
      if (!svg) return;

      svg.querySelectorAll("animateTransform").forEach(function (animation) {
        try {
          animation.beginElement();
        } catch (error) {}
      });
    }

    document.getElementById("spinner").addEventListener("load", startSpinnerAnimations);
  </script>
</body>
</html>
